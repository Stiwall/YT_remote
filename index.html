<style>
/* ═══════════════════════════════════════════════════════
   ESTILOS PWA - Botón de Instalación
   ═══════════════════════════════════════════════════════ */
.pwa-install-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
  color: white;
  border: none;
  border-radius: 50px;
  padding: 14px 24px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(255, 0, 0, 0.4);
  display: none;
  align-items: center;
  gap: 10px;
  z-index: 9999;
  transition: all 0.3s ease;
  animation: slideUp 0.4s ease;
}

.pwa-install-btn:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 6px 25px rgba(255, 0, 0, 0.5);
}

.pwa-install-btn:active {
  transform: translateY(0) scale(0.98);
}

.pwa-install-btn.show {
  display: flex;
}

.pwa-install-btn .icon {
  font-size: 1.2rem;
}

.pwa-install-btn .close {
  margin-left: 8px;
  padding: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  cursor: pointer;
  transition: background 0.2s;
}

.pwa-install-btn .close:hover {
  background: rgba(255,255,255,0.3);
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* PWA Update Banner */
.pwa-update-banner {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: var(--red);
  color: white;
  padding: 12px 20px;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 10000;
  font-size: 0.85rem;
  font-weight: 500;
}

.pwa-update-banner.show {
  display: flex;
}

.pwa-update-banner button {
  background: white;
  color: var(--red);
  border: none;
  padding: 8px 16px;
  border-radius: 20px;
  font-weight: 600;
  cursor: pointer;
  font-size: 0.8rem;
}

/* Offline Indicator */
.offline-indicator {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--yellow);
  color: var(--dark);
  padding: 10px 20px;
  border-radius: 25px;
  font-size: 0.8rem;
  font-weight: 600;
  z-index: 9998;
  transition: transform 0.3s ease;
  box-shadow: var(--shadow);
}

.offline-indicator.show {
  transform: translateX(-50%) translateY(0);
}

/* App-like feel for iOS */
@supports (-webkit-touch-callout: none) {
  body {
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
}

/* Prevent pull-to-refresh on mobile */
body {
  overscroll-behavior-y: none;
}

/* Smooth scrolling */
html {
  scroll-behavior: smooth;
}

/* ═══════════════════════════════════════════════════════
   TUS ESTILOS ORIGINALES (SIN MODIFICAR)
   ═══════════════════════════════════════════════════════ */
:root {
  --red: #FF0000;
  --red-dark: #CC0000;
  --red-light: #ff4444;
  --dark: #0f0f0f;
  --darker: #0a0a0a;
  --panel: #1a1a1a;
  --panel-hover: #222222;
  --border: #333333;
  --text: #ffffff;
  --text-secondary: #aaaaaa;
  --text-muted: #666666;
  --green: #00c853;
  --yellow: #ffd600;
  --blue: #2962ff;
  --shadow: 0 4px 20px rgba(0,0,0,0.5);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
  --radius: 12px;
  --radius-sm: 8px;
}

* { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
  -webkit-tap-highlight-color: transparent;
}

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* Header */
header {
  width: 100%;
  padding: 16px 24px;
  background: linear-gradient(180deg, var(--darker) 0%, var(--dark) 100%);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 15px rgba(255,0,0,0.3);
}

.logo-text {
  font-weight: 800;
  font-size: 1.5rem;
  letter-spacing: -0.5px;
}

.logo-text span {
  color: var(--red);
}

header .subtitle {
  color: var(--text-muted);
  font-size: 0.75rem;
  font-weight: 500;
}

/* Screens */
.screen { 
  display: none; 
  width: 100%;
  flex: 1;
}

.screen.active { 
  display: flex; 
  flex-direction: column; 
}

/* Setup Screen */
#screen-setup {
  padding: 30px 20px;
  max-width: 480px;
  margin: 0 auto;
  justify-content: center;
  gap: 20px;
}

.welcome-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  box-shadow: var(--shadow);
}

.welcome-card h2 {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.welcome-card p {
  color: var(--text-secondary);
  font-size: 0.9rem;
}

.sync-options {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.sync-option {
  background: var(--panel);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 16px;
}

.sync-option:hover {
  border-color: var(--text-secondary);
}

.sync-option.active {
  border-color: var(--red);
  background: rgba(255,0,0,0.05);
}

.sync-option .icon {
  width: 48px;
  height: 48px;
  background: var(--darker);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}

.sync-option.active .icon {
  background: var(--red);
}

.sync-option .info {
  flex: 1;
  text-align: left;
}

.sync-option .info h3 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 4px;
}

.sync-option .info p {
  font-size: 0.75rem;
  color: var(--text-muted);
  line-height: 1.4;
}

.sync-option .check {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: transparent;
  flex-shrink: 0;
}

.sync-option.active .check {
  background: var(--red);
  border-color: var(--red);
  color: white;
}

.mode-selector {
  display: flex;
  gap: 12px;
  background: var(--darker);
  padding: 6px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.mode-btn {
  flex: 1;
  padding: 14px 20px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  border: none;
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.mode-btn:hover {
  color: var(--text);
}

.mode-btn.active { 
  background: var(--red); 
  color: white;
  box-shadow: 0 4px 15px rgba(255,0,0,0.3);
}

.mode-btn .icon {
  font-size: 1.2rem;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.input-group label {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.input-wrapper input {
  width: 100%;
  background: var(--darker);
  border: 2px solid var(--border);
  color: var(--text);
  font-size: 1.3rem;
  font-weight: 700;
  padding: 16px 20px;
  border-radius: var(--radius);
  outline: none;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 4px;
  text-align: center;
}

.input-wrapper input:focus {
  border-color: var(--red);
  background: var(--panel);
}

.input-wrapper input::placeholder {
  color: var(--text-muted);
  font-weight: 400;
  letter-spacing: 2px;
  font-size: 1rem;
}

.btn-primary {
  width: 100%;
  padding: 18px 24px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
  border: none;
  color: white;
  border-radius: var(--radius);
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 4px 20px rgba(255,0,0,0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 25px rgba(255,0,0,0.4);
}

.btn-primary:active {
  transform: translateY(0);
}

.btn-secondary {
  padding: 14px 20px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  background: var(--panel);
  border: 2px solid var(--border);
  color: var(--text);
  border-radius: var(--radius);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-secondary:hover {
  border-color: var(--text-secondary);
  background: var(--panel-hover);
}

.info-box {
  background: linear-gradient(135deg, rgba(0,200,83,0.1) 0%, rgba(0,200,83,0.05) 100%);
  border: 1px solid rgba(0,200,83,0.2);
  border-radius: var(--radius-sm);
  padding: 16px;
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

.info-box strong {
  color: var(--green);
}

.warning-box {
  background: linear-gradient(135deg, rgba(255,214,0,0.1) 0%, rgba(255,214,0,0.05) 100%);
  border: 1px solid rgba(255,214,0,0.2);
  border-radius: var(--radius-sm);
  padding: 16px;
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

.warning-box strong {
  color: var(--yellow);
}

/* Main Screen */
#screen-main {
  max-width: 1400px;
  padding: 20px;
  gap: 20px;
  margin: 0 auto;
  width: 100%;
}

@media (min-width: 1024px) {
  #screen-main.active { 
    display: grid;
    grid-template-columns: 1fr 380px;
  }
}

/* Panels */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}

.panel:last-child { margin-bottom: 0; }

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.panel-title {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}

.badge {
  font-size: 0.65rem;
  background: var(--border);
  padding: 4px 10px;
  border-radius: 20px;
  color: var(--text);
  font-weight: 600;
}

/* Player */
#host-panel {
  display: none;
}

.player-container {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  background: var(--darker);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: var(--shadow-lg);
}

.player-container iframe,
.player-container > div {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}

.placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  color: var(--text-muted);
}

.placeholder-icon {
  width: 80px;
  height: 80px;
  background: var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}

.placeholder-text {
  font-size: 0.9rem;
  text-align: center;
  max-width: 280px;
  line-height: 1.5;
}

.now-playing-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--darker);
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
}

.now-badge {
  background: var(--red);
  color: white;
  font-size: 0.6rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.now-title {
  flex: 1;
  font-size: 0.9rem;
  font-weight: 500;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  color: var(--text);
}

.progress-container {
  margin-bottom: 12px;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  cursor: pointer;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red) 0%, var(--red-dark) 100%);
  width: 0%;
  transition: width 0.3s ease;
  border-radius: 3px;
}

.progress-bar:hover .progress-fill {
  background: var(--red);
}

.time-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 6px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

/* Controls */
.controls-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.ctrl-btn {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  cursor: pointer;
  background: var(--darker);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius-sm);
  transition: all 0.15s ease;
}

.ctrl-btn:hover {
  background: var(--panel-hover);
  border-color: var(--text-secondary);
  transform: scale(1.05);
}

.ctrl-btn:active {
  transform: scale(0.95);
}

.ctrl-btn.primary {
  background: var(--red);
  border-color: var(--red);
}

.ctrl-btn.primary:hover {
  background: var(--red-dark);
}

.volume-section {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--darker);
  border-radius: var(--radius-sm);
}

.volume-icon {
  font-size: 1.2rem;
  color: var(--text-muted);
}

input[type=range] {
  -webkit-appearance: none;
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  outline: none;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  background: var(--red);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(255,0,0,0.4);
  transition: transform 0.15s;
}

input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.1);
}

.volume-value {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 600;
  min-width: 36px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* URL Input */
.url-input-row {
  display: flex;
  gap: 8px;
}

.url-input-row input {
  flex: 1;
  background: var(--darker);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 0.85rem;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color 0.2s;
}

.url-input-row input:focus {
  border-color: var(--red);
}

.url-input-row input::placeholder {
  color: var(--text-muted);
}

.btn-small {
  padding: 10px 16px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-dark-sm {
  background: var(--darker);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-dark-sm:hover {
  background: var(--panel-hover);
  border-color: var(--text-secondary);
}

.btn-red-sm {
  background: var(--red);
  color: white;
}

.btn-red-sm:hover {
  background: var(--red-dark);
}

/* Search */
.api-section {
  margin-bottom: 12px;
}

.api-input-wrapper {
  display: flex;
  gap: 8px;
  align-items: center;
}

.api-input-wrapper input {
  flex: 1;
  background: var(--darker);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 0.8rem;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  outline: none;
}

.api-input-wrapper input:focus {
  border-color: var(--blue);
}

.api-link {
  color: var(--blue);
  text-decoration: none;
  font-size: 0.7rem;
  font-weight: 600;
  white-space: nowrap;
}

.api-link:hover {
  text-decoration: underline;
}

.search-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.search-row input {
  flex: 1;
  background: var(--darker);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 0.9rem;
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color 0.2s;
}

.search-row input:focus {
  border-color: var(--red);
}

.search-row input::placeholder {
  color: var(--text-muted);
}

/* Results */
.results-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 320px;
  overflow-y: auto;
  padding-right: 4px;
}

.results-list::-webkit-scrollbar,
.queue-list::-webkit-scrollbar,
.log-container::-webkit-scrollbar {
  width: 6px;
}

.results-list::-webkit-scrollbar-track,
.queue-list::-webkit-scrollbar-track,
.log-container::-webkit-scrollbar-track {
  background: var(--darker);
