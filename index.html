<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FF0000">
<meta name="msapplication-TileColor" content="#FF0000">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>YT Remote - Control Remoto YouTube</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --red: #FF0000;
  --red-dark: #CC0000;
  --red-light: #ff4444;
  --dark: #0f0f0f;
  --darker: #0a0a0a;
  --panel: #1a1a1a;
  --panel-hover: #222222;
  --border: #333333;
  --text: #ffffff;
  --text-secondary: #aaaaaa;
  --text-muted: #666666;
  --green: #00c853;
  --yellow: #ffd600;
  --blue: #2962ff;
  --shadow: 0 4px 20px rgba(0,0,0,0.5);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}
header {
  width: 100%;
  padding: 16px 24px;
  background: linear-gradient(180deg, var(--darker) 0%, var(--dark) 100%);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 15px rgba(255,0,0,0.3);
}
.logo-text { font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px; }
.logo-text span { color: var(--red); }
header .subtitle { color: var(--text-muted); font-size: 0.75rem; font-weight: 500; }
.screen { display: none; width: 100%; flex: 1; }
.screen.active { display: flex; flex-direction: column; }
#screen-setup {
  padding: 30px 20px;
  max-width: 480px;
  margin: 0 auto;
  justify-content: center;
  gap: 20px;
}
.welcome-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  box-shadow: var(--shadow);
}
.welcome-card h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
.welcome-card p { color: var(--text-secondary); font-size: 0.9rem; }
.mode-selector {
  display: flex;
  gap: 12px;
  background: var(--darker);
  padding: 6px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.mode-btn {
  flex: 1;
  padding: 14px 20px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  border: none;
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.mode-btn:hover { color: var(--text); }
.mode-btn.active { background: var(--red); color: white; box-shadow: 0 4px 15px rgba(255,0,0,0.3); }
.input-group { display: flex; flex-direction: column; gap: 8px; }
.input-group label {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}
.input-wrapper input {
  width: 100%;
  background: var(--darker);
  border: 2px solid var(--border);
  color: var(--text);
  font-size: 1.3rem;
  font-weight: 700;
  padding: 16px 20px;
  border-radius: var(--radius);
  outline: none;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 4px;
  text-align: center;
}
.input-wrapper input:focus { border-color: var(--red); background: var(--panel); }
.input-wrapper input::placeholder {
  color: var(--text-muted);
  font-weight: 400;
  letter-spacing: 2px;
  font-size: 1rem;
}
.password-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--darker);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  transition: border-color 0.2s;
}
.password-row:focus-within { border-color: var(--yellow); }
.password-row .lock-icon {
  font-size: 1rem;
  color: var(--text-muted);
  flex-shrink: 0;
}
.password-row input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 0.95rem;
  outline: none;
}
.password-row input::placeholder { color: var(--text-muted); font-size: 0.85rem; }
.btn-primary {
  width: 100%;
  padding: 18px 24px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
  border: none;
  color: white;
  border-radius: var(--radius);
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 4px 20px rgba(255,0,0,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255,0,0,0.4); }
.btn-primary:active { transform: translateY(0); }
.btn-secondary {
  padding: 14px 20px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  background: var(--panel);
  border: 2px solid var(--border);
  color: var(--text);
  border-radius: var(--radius);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-secondary:hover { border-color: var(--text-secondary); background: var(--panel-hover); }
.info-box {
  background: linear-gradient(135deg, rgba(0,200,83,0.1) 0%, rgba(0,200,83,0.05) 100%);
  border: 1px solid rgba(0,200,83,0.2);
  border-radius: var(--radius-sm);
  padding: 16px;
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.6;
}
.info-box strong { color: var(--green); }
#screen-main {
  max-width: 1400px;
  padding: 20px;
  gap: 20px;
  margin: 0 auto;
  width: 100%;
}
@media (min-width: 1024px) {
  #screen-main.active { display: grid; grid-template-columns: 1fr 380px; }
}
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.panel:last-child { margin-bottom: 0; }
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.panel-title {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.badge {
  font-size: 0.65rem;
  background: var(--border);
  padding: 4px 10px;
  border-radius: 20px;
  color: var(--text);
  font-weight: 600;
}
#host-panel { display: none; }
.player-container {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  background: var(--darker);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: var(--shadow-lg);
}
.player-container iframe,
.player-container > div {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}
.placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  color: var(--text-muted);
}
.placeholder-icon {
  width: 80px;
  height: 80px;
  background: var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}
.placeholder-text {
  font-size: 0.9rem;
  text-align: center;
  max-width: 280px;
  line-height: 1.5;
}
.now-playing-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--darker);
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
}
.now-badge {
  background: var(--red);
  color: white;
  font-size: 0.6rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.now-title {
  flex: 1;
  font-size: 0.9rem;
  font-weight: 500;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  color: var(--text);
}
.progress-container { margin-bottom: 12px; }
.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  cursor: pointer;
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red) 0%, var(--red-dark) 100%);
  width: 0%;
  transition: width 0.3s ease;
  border-radius: 3px;
}
.time-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 6px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}
.playback-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 10px 0 4px;
}
.round-btn {
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.18s ease;
  border-radius: 50%;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  outline: none;
}
.round-btn:active { transform: scale(0.88) !important; }
.play-btn {
  width: 52px;
  height: 52px;
  background: var(--panel-hover);
  color: var(--text);
  border: 1.5px solid var(--border);
}
.play-btn:hover {
  background: var(--border);
  border-color: var(--text-muted);
  transform: scale(1.06);
}
.play-toggle {
  width: 72px;
  height: 72px;
  background: var(--red);
  box-shadow: 0 5px 22px rgba(255, 0, 0, 0.45);
  position: relative;
  overflow: hidden;
}
.play-toggle::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.18), transparent 70%);
  pointer-events: none;
}
.play-toggle:hover {
  background: var(--red-dark);
  box-shadow: 0 7px 28px rgba(255, 0, 0, 0.6);
  transform: scale(1.06);
}
.play-pause-svg {
  width: 36px;
  height: 36px;
  display: block;
  overflow: visible;
}
.play-pause-svg .icon-play {
  opacity: 1;
  transform: scale(1);
  transition: opacity 0.2s ease, transform 0.2s ease;
  transform-origin: center;
}
.play-pause-svg .icon-pause {
  opacity: 0;
  transform: scale(0.6);
  transition: opacity 0.2s ease, transform 0.2s ease;
  transform-origin: center;
}
.play-toggle.is-playing .icon-play { opacity: 0; transform: scale(0.6); }
.play-toggle.is-playing .icon-pause { opacity: 1; transform: scale(1); }
@keyframes playPulse {
  0% { box-shadow: 0 5px 22px rgba(255,0,0,0.45), 0 0 0 0 rgba(255,0,0,0.4); }
  60% { box-shadow: 0 5px 22px rgba(255,0,0,0.45), 0 0 0 14px rgba(255,0,0,0); }
  100% { box-shadow: 0 5px 22px rgba(255,0,0,0.45), 0 0 0 0 rgba(255,0,0,0); }
}
.play-toggle.is-playing { animation: playPulse 2.4s ease-out infinite; }
.volume-section {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--darker);
  border-radius: var(--radius-sm);
  margin-top: 14px;
}
input[type=range] {
  -webkit-appearance: none;
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  background: var(--red);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(255,0,0,0.4);
  transition: transform 0.15s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.1); }
.volume-value {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 600;
  min-width: 36px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.unified-search-box { display: flex; flex-direction: column; gap: 10px; }
.unified-input-wrap {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--darker);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.unified-input-wrap:focus-within {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(255,0,0,0.1);
}
.unified-input-wrap.is-url {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(41,98,255,0.1);
}
.unified-icon {
  padding: 0 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  flex-shrink: 0;
  transition: color 0.2s;
}
.unified-input-wrap.is-url .unified-icon { color: var(--blue); }
.unified-input-wrap:focus-within:not(.is-url) .unified-icon { color: var(--red); }
#unified-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 0.95rem;
  padding: 13px 6px 13px 0;
  outline: none;
  min-width: 0;
}
#unified-input::placeholder { color: var(--text-muted); font-size: 0.85rem; }
.unified-clear {
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 0 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  flex-shrink: 0;
  transition: color 0.2s;
}
.unified-clear:hover { color: var(--text); }
.unified-actions { display: flex; gap: 8px; }
.unified-search-btn {
  flex: 1;
  padding: 12px 16px;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border-radius: var(--radius-sm);
}
.unified-url-btn {
  flex: 1;
  padding: 12px 10px;
  font-size: 0.85rem;
  justify-content: center;
}
.search-mode-chip {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  opacity: 0;
  transition: opacity 0.2s;
}
.search-mode-chip.show { opacity: 1; }
.search-mode-chip.chip-url {
  background: rgba(41,98,255,0.15);
  color: var(--blue);
  border: 1px solid rgba(41,98,255,0.3);
}
.search-mode-chip.chip-search {
  background: rgba(255,0,0,0.12);
  color: var(--red-light);
  border: 1px solid rgba(255,0,0,0.25);
}
.results-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 320px;
  overflow-y: auto;
  padding-right: 4px;
}
.result-item {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 10px;
  background: var(--darker);
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
}
.result-item:hover { background: var(--panel-hover); border-color: var(--border); }
.result-thumb {
  width: 100px;
  height: 56px;
  object-fit: cover;
  border-radius: 6px;
  flex-shrink: 0;
  background: var(--border);
}
.result-info { flex: 1; overflow: hidden; min-width: 0; }
.result-title {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}
.result-channel { font-size: 0.7rem; color: var(--text-muted); }
.result-actions { display: flex; gap: 6px; flex-shrink: 0; }
.hint {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-align: center;
  padding: 32px 16px;
  line-height: 1.6;
}
.btn-small {
  padding: 10px 16px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-dark-sm {
  background: var(--darker);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-dark-sm:hover { background: var(--panel-hover); border-color: var(--text-secondary); }
.btn-red-sm { background: var(--red); color: white; }
.btn-red-sm:hover { background: var(--red-dark); }
.queue-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 480px;
  overflow-y: auto;
  padding-right: 4px;
}
.q-item {
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 10px;
  background: var(--darker);
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
}
.q-item:hover { background: var(--panel-hover); border-color: var(--border); }
.q-item.playing { background: rgba(255,0,0,0.1); border-color: var(--red); }
.q-drag-handle {
  cursor: grab;
  color: var(--text-muted);
  font-size: 1.1rem;
  padding: 0 4px;
  user-select: none;
  flex-shrink: 0;
}
.q-drag-handle:active { cursor: grabbing; }
.q-number {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-muted);
  background: var(--border);
  border-radius: 50%;
  flex-shrink: 0;
}
.q-item.playing .q-number { background: var(--red); color: white; }
.q-thumb {
  width: 64px;
  height: 36px;
  object-fit: cover;
  border-radius: 4px;
  flex-shrink: 0;
  background: var(--border);
}
.q-info { flex: 1; overflow: hidden; min-width: 0; }
.q-title {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}
.q-channel { font-size: 0.65rem; color: var(--text-muted); }
.q-actions { display: flex; gap: 4px; flex-shrink: 0; }
.q-empty {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-align: center;
  padding: 32px 16px;
  background: var(--darker);
  border-radius: var(--radius-sm);
  border: 2px dashed var(--border);
  line-height: 1.6;
}
.log-container {
  max-height: 150px;
  overflow-y: auto;
  font-size: 0.7rem;
  line-height: 1.8;
  font-family: 'SF Mono', monospace;
}
.log-entry {
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
}
.log-time { color: var(--text-muted); flex-shrink: 0; }
.log-send { color: var(--blue); }
.log-recv { color: var(--green); }
.log-warn { color: var(--yellow); }
.log-info { color: var(--text-secondary); }
.log-error { color: #ff4444; font-weight: 600; }
.status-card { text-align: center; padding: 20px; }
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 16px;
}
.status-badge::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.s-connected { background: rgba(0,200,83,0.15); color: var(--green); border: 1px solid rgba(0,200,83,0.3); }
.s-connected::before { background: var(--green); }
.s-disconnected { background: rgba(255,0,0,0.15); color: #ff4444; border: 1px solid rgba(255,0,0,0.3); }
.s-disconnected::before { background: #ff4444; animation: none; }
.s-syncing { background: rgba(255,214,0,0.15); color: var(--yellow); border: 1px solid rgba(255,214,0,0.3); }
.s-syncing::before { background: var(--yellow); }
.s-local { background: rgba(41,98,255,0.15); color: var(--blue); border: 1px solid rgba(41,98,255,0.3); }
.s-local::before { background: var(--blue); animation: none; }
.room-code-display {
  background: var(--darker);
  border: 2px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 20px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.room-code-display:hover { border-color: var(--red); background: rgba(255,0,0,0.05); }
.room-code-text {
  font-size: 2.5rem;
  font-weight: 800;
  letter-spacing: 8px;
  color: var(--red);
  font-family: 'SF Mono', monospace;
}
.copy-hint {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.room-info {
  font-size: 0.75rem;
  color: var(--text-secondary);
  line-height: 1.8;
  text-align: left;
  background: var(--darker);
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
}
.room-info strong { color: var(--text); }
