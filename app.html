<!DOCTYPE html>
<html lang="es">
<head>
<base href="/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>YT Remote</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f0f0f;
  --bg-2: #141414;
  --surface: #1a1a1a;
  --surface-2: #222222;
  --border: #2a2a2a;
  --border-2: #333333;
  --accent: #ff2222;
  --accent-dim: rgba(255,34,34,0.15);
  --text: #f0f0f0;
  --text-2: #aaaaaa;
  --text-3: #666666;
  --green: #00d084;
  --green-dim: rgba(0,208,132,0.12);
  --yellow: #ffc300;
  --blue: #3d8bff;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.65);
  --t: 0.2s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

/* ─── Screens ─── */
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

/* ─── HEADER ─── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left { display: flex; align-items: center; gap: 10px; }

.logo-icon {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-icon svg { width: 16px; height: 16px; }

.logo-text { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.3px; }
.logo-text span { color: var(--accent); }

.room-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 0.65rem; font-weight: 700;
  color: var(--text-2);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.room-badge.connected { border-color: var(--green); color: var(--green); }

.header-right { display: flex; align-items: center; gap: 8px; }

.icon-btn {
  width: 34px; height: 34px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: var(--t);
  color: var(--text-2);
}
.icon-btn:hover { background: var(--surface-2); color: var(--text); }
.icon-btn svg { width: 15px; height: 15px; }

/* ─── SETUP ─── */
#screen-setup {
  padding: 32px 20px;
  max-width: 420px;
  margin: 0 auto;
  width: 100%;
  justify-content: center;
  gap: 18px;
  flex: 1;
}

.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  text-align: center;
}

.setup-icon {
  width: 60px; height: 60px;
  background: var(--accent);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px;
  box-shadow: 0 6px 20px rgba(255,34,34,0.3);
}
.setup-icon svg { width: 26px; height: 26px; }

.setup-card h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
.setup-card p { color: var(--text-2); font-size: 0.82rem; }

/* Mode selector */
.mode-sel {
  display: flex;
  gap: 6px;
  background: var(--bg-2);
  padding: 4px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

.mode-btn {
  flex: 1;
  padding: 11px 14px;
  font-size: 0.82rem; font-weight: 600;
  cursor: pointer; background: transparent; border: none;
  color: var(--text-3); border-radius: 8px;
  transition: var(--t);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.mode-btn svg { width: 15px; height: 15px; }
.mode-btn.active { background: var(--accent); color: white; box-shadow: 0 3px 12px rgba(255,34,34,0.3); }

/* Inputs */
.input-group { display: flex; flex-direction: column; gap: 7px; }
.input-group label { font-size: 0.68rem; color: var(--text-3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

.input-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  transition: var(--t);
}
.input-row:focus-within { border-color: var(--accent); }
.input-row svg { width: 15px; height: 15px; color: var(--text-3); flex-shrink: 0; }
.input-row input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-size: 0.9rem;
}
.input-row input::placeholder { color: var(--text-3); }

.input-code {
  background: var(--bg-2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  transition: var(--t); text-align: center;
  font-size: 1.3rem; font-weight: 800;
  letter-spacing: 6px; text-transform: uppercase; outline: none;
  color: var(--text); width: 100%;
}
.input-code:focus { border-color: var(--accent); background: var(--surface); }
.input-code::placeholder { color: var(--text-3); font-weight: 400; letter-spacing: 2px; font-size: 0.95rem; }

/* Buttons */
.btn {
  padding: 14px 20px; font-size: 0.9rem; font-weight: 700;
  cursor: pointer; border: none; border-radius: var(--radius-sm);
  transition: var(--t); display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn svg { width: 15px; height: 15px; }

.btn-pri { background: var(--accent); color: white; box-shadow: 0 4px 16px rgba(255,34,34,0.3); }
.btn-pri:hover { background: #e01515; transform: translateY(-1px); }

.btn-sec {
  background: var(--surface); color: var(--text-2);
  border: 1.5px solid var(--border);
}
.btn-sec:hover { background: var(--surface-2); color: var(--text); }

/* ─── HOST SCREEN ─── */
#screen-host { flex: 1; }

.host-player {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  background: #000;
  flex: 1;
}
.host-player iframe, .host-player > div { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

.host-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  color: var(--text-3);
}
.host-placeholder svg { width: 48px; height: 48px; opacity: 0.3; }
.host-placeholder p { font-size: 0.85rem; }

/* ─── CONTROL SCREEN ─── */
#screen-control { flex: 1; padding-bottom: 70px; }

.ctrl-content { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

/* Play button */
.play-btn-wrap { display: flex; justify-content: center; padding: 8px 0; }

.play-btn {
  width: 72px; height: 72px;
  background: var(--accent);
  border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: var(--t);
  box-shadow: 0 4px 24px rgba(255,34,34,0.4);
  position: relative; overflow: hidden;
}
.play-btn::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.15), transparent 70%);
}
.play-btn:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(255,34,34,0.55); }
.play-btn:active { transform: scale(0.95); }
.play-btn svg { width: 30px; height: 30px; position: relative; z-index: 1; transition: opacity 0.15s; }
.btn-icon-hidden { opacity: 0; }
.btn-icon-active { opacity: 1; }

/* Secondary controls row */
.ctrl-row {
  display: flex; justify-content: center; gap: 10px;
}

.ctrl-sm {
  width: 52px; height: 52px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: var(--t); gap: 2px;
}
.ctrl-sm:hover { background: var(--border); transform: scale(1.03); }
.ctrl-sm:active { transform: scale(0.95); }
.ctrl-sm svg { width: 18px; height: 18px; }
.ctrl-sm span { font-size: 0.52rem; font-weight: 700; color: var(--text-3); letter-spacing: 0.3px; }

/* Search */
.search-box {
  display: flex; gap: 8px;
}
.search-box input {
  flex: 1;
  background: var(--bg-2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  color: var(--text); font-size: 0.88rem; outline: none;
  transition: var(--t);
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text-3); }

.search-box .btn { padding: 11px 16px; }

/* Results */
.results { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }

.result-item {
  display: flex; gap: 10px; align-items: center;
  padding: 8px; background: var(--bg-2);
  border-radius: var(--radius-xs); cursor: pointer;
  transition: var(--t);
}
.result-item:hover { background: var(--surface-2); }
.result-thumb { width: 100px; height: 56px; object-fit: cover; border-radius: 5px; flex-shrink: 0; background: var(--surface-2); }
.result-info { flex: 1; overflow: hidden; }
.result-title { font-size: 0.75rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-ch { font-size: 0.65rem; color: var(--text-3); margin-top: 2px; }
.result-act { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.result-act .btn-xs { padding: 5px 8px; font-size: 0.62rem; }

/* Queue */
.queue-header { display: flex; align-items: center; justify-content: space-between; }
.queue-title { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-3); display: flex; align-items: center; gap: 6px; }
.queue-title svg { width: 13px; height: 13px; }
.badge { font-size: 0.6rem; background: var(--border-2); padding: 2px 8px; border-radius: 20px; color: var(--text-2); font-weight: 600; }

.queue-list { display: flex; flex-direction: column; gap: 6px; }

.q-item {
  display: flex; gap: 9px; align-items: center;
  padding: 8px; background: var(--bg-2);
  border-radius: var(--radius-xs); transition: var(--t);
}
.q-item.playing { background: var(--accent-dim); border: 1px solid rgba(255,34,34,0.3); }
.q-thumb { width: 50px; height: 28px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: var(--surface-2); }
.q-info { flex: 1; overflow: hidden; }
.q-title { font-size: 0.72rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.q-num { font-size: 0.65rem; color: var(--text-3); font-weight: 600; width: 20px; text-align: center; flex-shrink: 0; }
.q-item.playing .q-num { color: var(--accent); }
.q-del { background: transparent; border: none; color: var(--text-3); cursor: pointer; padding: 4px; border-radius: 4px; transition: var(--t); display: flex; align-items: center; }
.q-del:hover { color: var(--accent); background: var(--accent-dim); }
.q-del svg { width: 14px; height: 14px; }
.q-empty { text-align: center; padding: 24px; color: var(--text-3); font-size: 0.8rem; background: var(--bg-2); border-radius: var(--radius-xs); border: 1.5px dashed var(--border); }

/* ─── ROOM TAB ─── */
.room-tab { padding: 16px; display: flex; flex-direction: column; gap: 16px; align-items: center; }

.room-code-box {
  background: var(--bg-2);
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 24px 32px; text-align: center;
  cursor: pointer; transition: var(--t); width: 100%;
}
.room-code-box:hover { border-color: var(--accent); background: var(--accent-dim); }
.room-code-val { font-size: 2.4rem; font-weight: 800; letter-spacing: 8px; color: var(--accent); font-family: 'SF Mono','Fira Code',monospace; }
.room-code-hint { font-size: 0.68rem; color: var(--text-3); margin-top: 6px; }

.status-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 20px;
  font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
.status-pill::before { content: ''; width: 7px; height: 7px; border-radius: 50%; animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.s-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,208,132,0.3); }
.s-green::before { background: var(--green); animation: none; }
.s-red { background: rgba(255,34,34,0.12); color: #ff5555; border: 1px solid rgba(255,34,34,0.25); }
.s-red::before { background: #ff5555; animation: none; }
.s-yellow { background: rgba(255,195,0,0.1); color: var(--yellow); border: 1px solid rgba(255,195,0,0.25); }
.s-yellow::before { background: var(--yellow); }

.qr-card {
  background: white; border-radius: 14px;
  padding: 14px 14px 10px; text-align: center;
  box-shadow: var(--shadow-lg);
}
#qr-canvas { display: flex; justify-content: center; }

.room-actions { display: flex; gap: 8px; width: 100%; }
.room-actions .btn { flex: 1; }

.room-info-text { font-size: 0.72rem; color: var(--text-2); background: var(--bg-2); padding: 10px 14px; border-radius: var(--radius-xs); width: 100%; text-align: left; line-height: 1.7; }
.room-info-text strong { color: var(--text); }

/* ─── HISTORY TAB ─── */
.hist-tab { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.hist-header { display: flex; align-items: center; justify-content: space-between; }
.hist-title { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-3); display: flex; align-items: center; gap: 6px; }
.hist-title svg { width: 13px; height: 13px; }

.hist-list { display: flex; flex-direction: column; gap: 6px; }
.hist-item {
  display: flex; gap: 10px; align-items: center;
  padding: 8px; background: var(--bg-2);
  border-radius: var(--radius-xs); cursor: pointer; transition: var(--t);
}
.hist-item:hover { background: var(--surface-2); }
.hist-thumb { width: 70px; height: 40px; object-fit: cover; border-radius: 5px; flex-shrink: 0; background: var(--surface-2); }
.hist-info { flex: 1; overflow: hidden; }
.hist-title2 { font-size: 0.75rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-meta { font-size: 0.65rem; color: var(--text-3); margin-top: 2px; }
.hist-empty { text-align: center; padding: 40px 20px; color: var(--text-3); font-size: 0.82rem; background: var(--bg-2); border-radius: var(--radius-xs); border: 1.5px dashed var(--border); }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  display: flex;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 200;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; padding: 8px 4px;
  background: transparent; border: none; cursor: pointer;
  color: var(--text-3); font-size: 0.58rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.3px;
  transition: var(--t);
}
.tab-btn svg { width: 20px; height: 20px; }
.tab-btn.active { color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: flex; flex-direction: column; flex: 1; }

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface-2); color: var(--text);
  padding: 12px 20px; border-radius: 25px;
  font-size: 0.82rem; font-weight: 600;
  box-shadow: var(--shadow-lg); border: 1px solid var(--border);
  opacity: 0; transition: opacity 0.2s, transform 0.2s;
  z-index: 9999; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── MODAL ─── */
.modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  display: none; align-items: center; justify-content: center;
  z-index: 500; padding: 20px;
}
.modal.show { display: flex; }
.modal-body {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px;
  width: 100%; max-width: 380px; box-shadow: var(--shadow-lg);
}
.modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
.modal p { font-size: 0.82rem; color: var(--text-2); margin-bottom: 16px; }
.modal .btn-group { display: flex; gap: 8px; margin-top: 16px; }
.modal .btn-group .btn { flex: 1; }

/* Progress bar */
.progress-bar {
  width: 100%; height: 4px; background: var(--border);
  border-radius: 2px; overflow: hidden; cursor: pointer;
}
.progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
.time-row { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--text-3); margin-top: 4px; font-variant-numeric: tabular-nums; }

/* Now playing bar */
.now-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: var(--bg-2);
  border-radius: var(--radius-xs); margin-bottom: 8px;
}
.now-badge { background: var(--accent); color: white; font-size: 0.55rem; font-weight: 700; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.now-title { flex: 1; font-size: 0.8rem; font-weight: 500; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

/* Volume */
.vol-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg-2); border-radius: var(--radius-xs); }
.vol-row svg { width: 15px; height: 15px; color: var(--text-3); flex-shrink: 0; }
.vol-row input { flex: 1; height: 4px; -webkit-appearance: none; background: var(--border); border-radius: 2px; outline: none; }
.vol-row input::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; }
.vol-val { font-size: 0.68rem; color: var(--text-3); font-weight: 600; min-width: 32px; text-align: right; font-variant-numeric: tabular-nums; }

/* Empty hint */
.hint { font-size: 0.8rem; color: var(--text-3); text-align: center; padding: 20px; }

/* Volume section in host */
.host-vol { padding: 0 16px 12px; background: var(--bg-2); }
</style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header id="header" style="display:none">
  <div class="header-left">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
    </div>
    <span class="logo-text">YT <span>Remote</span></span>
  </div>
  <div class="header-right">
    <span class="room-badge" id="header-room-badge">-----</span>
    <button class="icon-btn" onclick="leaveRoom()" title="Salir">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</header>

<!-- ─── SETUP ─── -->
<div id="screen-setup" class="screen active">
  <div class="setup-card">
    <div class="setup-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="white"/></svg>
    </div>
    <h2>YT Remote</h2>
    <p>Controla YouTube desde tu celular</p>
  </div>

  <div class="mode-sel">
    <button class="mode-btn active" id="btn-host" onclick="setMode('host')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Pantalla
    </button>
    <button class="mode-btn" id="btn-remote" onclick="setMode('remote')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="17" r="1" fill="currentColor"/></svg>
      Control
    </button>
  </div>

  <div class="input-group">
    <label>Codigo de Sala</label>
    <input class="input-code" id="room-input" type="text" placeholder="EJ: CASA1" maxlength="10" onkeydown="if(event.key==='Enter')joinRoom()">
  </div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- QR lib -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
/* ─── State ─── */
let mode = 'host';
let roomCode = '';
let roomPassword = '';
let ytPlayer = null;
let ytReady = false;
let isPlaying = false;
let muted = false;
let currentVideoId = '';
let currentTitle = '';
let queue = [];
let history = [];
let peer = null;
let peerConn = null;
let peerConns = new Map();
let bc = null;
let _peerReady = false;
let _hostConnAttempts = 0;
let _reconnectCount = 0;
let _useRelay = false;
let inRoom = false;
let newRoomMode = 'host';

/* ─── PeerJS Servers ─── */
const SERVERS = [
  { host: '0.peerjs.com', port: 443, path: '/', ping: 100 },
  { host: 'ytremote-0if1.onrender.com', port: 443, path: '/', ping: 200 },
];
let currentServerIndex = 0;

function makeHostId(code) { return 'ht-' + code.toLowerCase(); }
function makeRemoteId(code) { return 'rm-' + code.toLowerCase(); }

/* ─── Helpers ─── */
function h(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), dur);
}

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c = '';
  for (let i = 0; i < 6; i++) c += chars[Math.floor(Math.random() * chars.length)];
  document.getElementById('room-input').value = c;
}

function createAndEnter() {
  generateCode();
  // Give 50ms for the input to update, then join
  setTimeout(() => joinRoom(), 50);
}

/* ─── Mode ─── */
function setMode(m) {
  mode = m;
  document.getElementById('btn-host').classList.toggle('active', m === 'host');
  document.getElementById('btn-remote').classList.toggle('active', m === 'remote');
}

/* ─── Screen routing ─── */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('header').style.display = name === 'setup' ? 'none' : 'flex';
}

/* ─── Tab navigation ─── */
function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim().toLowerCase().includes(name));
  });
}

/* ─── Join / Create Room ─── */
function joinRoom() {
  const code = document.getElementById('room-input').value.trim().toUpperCase();
  const pw = document.getElementById('room-password').value;
  if (!code) { showToast('Escribe un codigo'); return; }
  roomCode = code;
  roomPassword = pw;
  inRoom = true;
  startRoom();
}

function startRoom() {
  showScreen('host');
  if (mode === 'host') {
    initHost();
  } else {
    initRemote();
  }
  updateRoomUI();
  renderQueue();
  renderHistory();
}

function leaveRoom() {
  inRoom = false;
  if (peer) { try { peer.destroy(); } catch(e) {} peer = null; }
  peerConn = null;
  peerConns.forEach(c => { try { c.close(); } catch(e) {} });
  peerConns.clear();
  if (bc) { try { bc.close(); } catch(e) {} bc = null; }
  ytPlayer = null; ytReady = false;
  currentVideoId = '';
  queue = [];
  roomCode = ''; roomPassword = '';
  showScreen('setup');
  document.getElementById('room-input').value = '';
}

/* ─── Room UI ─── */
function updateRoomUI() {
  document.getElementById('header-room-badge').textContent = roomCode;
  document.getElementById('room-code-display').textContent = roomCode;
  document.getElementById('room-meta-text').innerHTML =
    '<strong>Modo:</strong> ' + (mode === 'host' ? 'Pantalla' : 'Control') + '<br>' +
    '<strong>Sala:</strong> ' + roomCode + (roomPassword ? ' 🔒' : '') + '<br>' +
    '<strong>Estado:</strong> Conectando...';
}

function setStatus(type, msg) {
  const pill = document.getElementById('status-pill');
  pill.className = 'status-pill s-' + type;
  pill.textContent = msg;
}

/* ─── QR Code ─── */
function toggleQR() {
  const area = document.getElementById('qr-area');
  if (area.style.display === 'none') {
    area.style.display = 'block';
    const url = window.location.origin + '/?room=' + roomCode + '&mode=remote';
    const container = document.getElementById('qr-canvas');
    container.innerHTML = '';
    try {
      new QRCode(container, {
        text: url,
        width: 160,
        height: 160,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch(e) {
      container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-3);font-size:0.8rem">No se pudo generar el QR<br><a href="' + url + '" style="color:var(--blue)">' + url + '</a></div>';
    }
  } else {
    area.style.display = 'none';
  }
}

function copyCode() {
  navigator.clipboard.writeText(roomCode).then(() => showToast('Codigo copiado'));
}

function copyRoomLink() {
  const url = window.location.origin + '/?room=' + roomCode + '&mode=remote';
  navigator.clipboard.writeText(url).then(() => showToast('Link copiado'));
}

function shareRoomLink() {
  const url = window.location.origin + '/?room=' + roomCode + '&mode=remote';
  if (navigator.share) {
    navigator.share({ title: 'YT Remote', text: 'Unete a mi sala YT Remote — ' + roomCode, url });
  } else {
    copyRoomLink();
  }
}

/* ─── New Room Modal ─── */
function generateNewCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c = '';
  for (let i = 0; i < 6; i++) c += chars[Math.floor(Math.random() * chars.length)];
  document.getElementById('new-code-input').value = c;
}

function openNewRoomModal() {
  document.getElementById('new-room-modal').classList.add('show');
  generateNewCode();
}

function closeNewRoomModal() {
  document.getElementById('new-room-modal').classList.remove('show');
}

function updateNewRoomBtns() {
  document.getElementById('new-btn-host').classList.toggle('active', newRoomMode === 'host');
  document.getElementById('new-btn-remote').classList.toggle('active', newRoomMode === 'remote');
}

function confirmNewRoom() {
  const code = document.getElementById('new-code-input').value.trim().toUpperCase();
  const pw = document.getElementById('new-password-input').value;
  if (!code) { showToast('Escribe un codigo'); return; }
  roomCode = code; roomPassword = pw; mode = newRoomMode;
  inRoom = true;
  closeNewRoomModal();
  startRoom();
}

/* ─── PeerJS ─── */
function initPeer() {
  if (peer) { try { peer.destroy(); } catch(e) {} peer = null; }
  _peerReady = false;
  if (!roomCode) return;

  const srv = SERVERS[currentServerIndex];
  const myId = mode === 'host' ? makeHostId(roomCode) : makeRemoteId(roomCode);

  try { peer = new Peer(myId, srv); }
  catch(e) { setTimeout(initPeer, 3000); return; }

  peer.on('open', (id) => {
    _peerReady = true; _reconnectCount = 0;
    if (mode === 'host') {
      setStatus('yellow', 'Esperando control...');
      showToast('Sala lista: ' + roomCode);
    } else {
      setStatus('yellow', 'Conectando...');
      connectToHost();
    }
  });

  peer.on('connection', (conn) => {
    if (mode !== 'host') return;
    const meta = conn.metadata || {};
    if (roomPassword && meta.password !== roomPassword) {
      conn.on('open', () => { try { conn.send({type:'auth-rejected',reason:'Contrasena incorrecta'});} catch(e){} setTimeout(() => {try{conn.close();}catch(e){}}, 500); });
      return;
    }
    setupConn(conn);
    conn.on('open', () => {
      showToast('Control conectado'); setStatus('green', 'Conectado');
      setTimeout(() => broadcastState(), 300);
    });
  });

  peer.on('error', (err) => {
    const t = err.type || '';
    if (t === 'peer-unavailable' && mode === 'remote') {
      _hostConnAttempts++;
      setTimeout(connectToHost, Math.min(1500 * Math.pow(1.5, _hostConnAttempts-1), 12000));
    } else if (t === 'unavailable-id') {
      setTimeout(initPeer, 8000);
    } else {
      setTimeout(initPeer, 5000);
    }
  });

  peer.on('disconnected', () => {
    _reconnectCount++;
    if (_reconnectCount >= 5) { currentServerIndex = (currentServerIndex + 1) % SERVERS.length; _reconnectCount = 0; }
    setTimeout(() => { if (peer && !peer.destroyed) try { peer.reconnect(); } catch(e) { initPeer(); } }, 2000);
  });
}

function connectToHost() {
  if (!roomCode || !peer || !_peerReady) { setTimeout(connectToHost, 1000); return; }
  if (peerConn && peerConn.open) return;
  _hostConnAttempts++;
  if (_hostConnAttempts > 15) { showToast('No se encontro la pantalla'); setStatus('red', 'Sin conexion'); return; }
  setStatus('yellow', 'Buscando...');
  const conn = peer.connect(makeHostId(roomCode), { metadata: { password: roomPassword } });
  setupConn(conn);
  conn.on('open', () => { showToast('Conectado!'); setStatus('green', 'Conectado'); showScreen('control'); });
  conn.on('close', () => { setStatus('red', 'Desconectado'); peerConn = null; });
}

function setupConn(conn) {
  if (mode === 'host') {
    peerConns.set(conn.peer, conn);
  } else {
    peerConn = conn;
  }
  conn.on('data', (data) => { handleMessage(data); });
  conn.on('error', () => { if (mode === 'host') peerConns.delete(conn.peer); });
}

function sendCmd(type, data = {}) {
  const msg = { type, ...data };
  if (mode === 'host') {
    peerConns.forEach(conn => { if (conn.open) conn.send(msg); });
  } else {
    if (peerConn && peerConn.open) peerConn.send(msg);
  }
  if (bc) bc.postMessage(msg);
}

function broadcastState() {
  if (!ytReady) return;
  sendCmd('sync', {
    videoId: currentVideoId,
    title: currentTitle,
    time: ytPlayer.getCurrentTime(),
    duration: ytPlayer.getDuration(),
    playing: isPlaying,
    volume: ytPlayer.isMuted() ? 0 : ytPlayer.getVolume(),
    queue
  });
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'sync':
      if (mode === 'remote') {
        currentVideoId = msg.videoId || '';
        currentTitle = msg.title || '';
        isPlaying = msg.playing;
        queue = msg.queue || [];
        if (msg.videoId && msg.videoId !== currentVideoId) { loadVideo(msg.videoId, msg.title); }
        else { updatePlayBtn(msg.playing); renderQueue(); }
        updateNowBar(msg.title);
      }
      break;
    case 'play':
      if (mode === 'host' && ytReady) ytPlayer.playVideo();
      break;
    case 'pause':
      if (mode === 'host' && ytReady) ytPlayer.pauseVideo();
      break;
    case 'load':
      if (mode === 'host' && ytReady && msg.videoId) { loadVideo(msg.videoId, msg.title); }
      break;
    case 'seek-relative':
      if (mode === 'host' && ytReady) {
        const t = ytPlayer.getCurrentTime() + (msg.delta || 0);
        ytPlayer.seekTo(Math.min(ytPlayer.getDuration(), Math.max(0, t)));
      }
      break;
    case 'volume':
      if (mode === 'host' && ytReady) ytPlayer.setVolume(msg.value);
      break;
    case 'mute':
      if (mode === 'host' && ytReady) ytPlayer.mute();
      break;
    case 'unmute':
      if (mode === 'host' && ytReady) ytPlayer.unMute();
      break;
    case 'queue-add':
      if (mode === 'host') {
        queue.push({ id: msg.videoId, title: msg.title, thumb: msg.thumb });
        renderQueue();
      }
      break;
    case 'queue-remove':
      if (mode === 'host') {
        queue.splice(msg.index, 1);
        renderQueue();
      }
      break;
    case 'queue-play':
      if (mode === 'host' && ytReady && queue[msg.index]) {
        const v = queue.splice(msg.index, 1)[0];
        loadVideo(v.id, v.title);
        renderQueue();
      }
      break;
    case 'auth-rejected':
      showToast('Acceso denegado: ' + (msg.reason || 'Contrasena incorrecta'));
      break;
  }
}

/* ─── YouTube IFrame API ─── */
function onYouTubeIframeAPIReady() {
  if (mode !== 'host') return;
  ytPlayer = new YT.Player('player', {
    events: {
      onReady: () => { ytReady = true; document.getElementById('host-placeholder').style.display = 'none'; },
      onStateChange: (e) => {
        isPlaying = e.data === YT.PlayerState.PLAYING;
        updatePlayBtn(isPlaying);
        sendCmd('sync', { videoId: currentVideoId, title: currentTitle, playing: isPlaying, queue });
      }
    }
  });
}

function loadVideo(id, title) {
  currentVideoId = id; currentTitle = title || id;
  if (ytReady && ytPlayer) {
    ytPlayer.loadVideoById(id);
    addToHistory(id, title);
  }
  document.getElementById('host-placeholder').style.display = 'none';
  updatePlayBtn(true);
  updateNowBar(title);
}

function togglePlayPause() {
  if (mode === 'host' && ytReady) {
    isPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
  } else {
    sendCmd(isPlaying ? 'pause' : 'play');
  }
}

function updatePlayBtn(playing) {
  isPlaying = playing;
  document.getElementById('ico-play').classList.toggle('btn-icon-active', !playing);
  document.getElementById('ico-play').classList.toggle('btn-icon-hidden', playing);
  document.getElementById('ico-pause').classList.toggle('btn-icon-active', playing);
  document.getElementById('ico-pause').classList.toggle('btn-icon-hidden', !playing);
}

function updateNowBar(title) {
  const bar = document.getElementById('now-bar');
  if (title) {
    bar.style.display = 'flex';
    document.getElementById('now-title').textContent = title;
  } else {
    bar.style.display = 'none';
  }
}

function sendVol(v) {
  document.getElementById('vol-val').textContent = v + '%';
  if (mode === 'host' && ytReady) ytPlayer.setVolume(v);
  else sendCmd('volume', { value: v });
}

/* ─── Search ─── */
function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;

  // Check if it's a YouTube URL
  const id = extractVideoId(q);
  if (id) {
    if (mode === 'host') { loadVideo(id, ''); }
    else { sendCmd('load', { videoId: id, title: '' }); showToast('Enviando...'); }
    return;
  }

  // It's a search query — run multi-source search
  doMultiSearch(q);
}

function extractVideoId(url) {
  const m = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

/* Multi-source search engine */
const PIPED_INSTANCES = [
  'https://pipedapi.kavin.rocks',
  'https://pipedapi.adminforge.de',
  'https://pipedapi.in.projectsegfau.lt',
  'https://piped-api.garudalinux.org',
  'https://pipedapi.tokhmi.xyz',
  'https://pipedapi.projectsegfau.lt',
];

const INVIDIOUS_INSTANCES = [
  'https://inv.nadeko.net',
  'https://invidious.privacydev.net',
  'https://invidious.nerdvpn.de',
  'https://invidious.io.lol',
  'https://yt.cdaut.de',
  'https://invidious.fdn.fr',
  'https://invidious.perennialte.ch',
  'https://invidious.lunar.icu',
  'https://iv.melmac.space',
  'https://invidious.drgns.space',
  'https://iv.nboeck.de',
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function fetchWithTimeout(url, ms = 6000) {
  const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms));
  return Promise.race([fetch(url), timeout]);
}

// YouTube Data API v3 key (obfuscated)
(function(){
  var _e=[107, 98, 86, 76, 125, 86, 116, 83, 81, 127, 87, 119, 116, 127, 21, 79, 95, 92, 5, 108, 12, 111, 22, 23, 14, 45, 42, 11, 34, 4, 4, 1, 51, 34, 6, 43, 122, 61, 9];
  var _k=_e.map(function(b,i){return String.fromCharCode(b^(42+i)%127);}).join('');
  window.__ytKey = _k;
})();

async function searchYouTubeAPI(q, key) {
  const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=9&q=${encodeURIComponent(q)}&key=${encodeURIComponent(key)}&relevanceLanguage=es&hl=es`;
  const r = await fetchWithTimeout(url, 6000);
  const data = await r.json();
  if (data.error) throw new Error(data.error.message);
  return (data.items || []).map(it => ({
    videoId: it.id.videoId,
    title: it.snippet.title,
    author: it.snippet.channelTitle,
    thumbnailUrl: it.snippet.thumbnails?.medium?.url || `https://i.ytimg.com/vi/${it.id.videoId}/mqdefault.jpg`
  }));
}

async function searchPiped(q) {
  const enc = encodeURIComponent(q);
  const instances = shuffle(PIPED_INSTANCES);
  for (const base of instances) {
    try {
      const r = await fetchWithTimeout(`${base}/search?q=${enc}&filter=videos`, 6000);
      if (!r.ok) continue;
      const data = await r.json();
      const items = data.items || [];
      if (!items.length) continue;
      return items.slice(0, 9).map(it => ({
        videoId: it.url?.replace('/watch?v=', '') || it.videoId || '',
        title: it.title || 'Sin titulo',
        author: it.uploaderName || it.uploader || '',
        thumbnailUrl: it.thumbnail || `https://i.ytimg.com/vi/${it.url?.replace('/watch?v=','')}/mqdefault.jpg`
      })).filter(i => i.videoId);
    } catch(e) { continue; }
  }
  return null;
}

async function searchInvidious(q) {
  const enc = encodeURIComponent(q);
  const instances = shuffle(INVIDIOUS_INSTANCES);
  for (const base of instances) {
    try {
      const r = await fetchWithTimeout(`${base}/api/v1/search?q=${enc}&type=video&count=9`, 6000);
      if (!r.ok) continue;
      const data = await r.json();
      if (!Array.isArray(data) || !data.length) continue;
      return data.slice(0, 9).map(it => ({
        videoId: it.videoId,
        title: it.title || 'Sin titulo',
        author: it.author || '',
        thumbnailUrl: it.thumbnailUrl || `https://i.ytimg.com/vi/${it.videoId}/mqdefault.jpg`
      }));
    } catch(e) { continue; }
  }
  return null;
}

async function searchCorsProxy(q) {
  try {
    const enc = encodeURIComponent(q);
    const r = await fetchWithTimeout(`https://corsproxy.io/?url=${encodeURIComponent('https://www.youtube.com/results?search_query=' + enc)}`, 8000);
    if (!r.ok) return null;
    const html = await r.text();
    const ids = [...new Set([...html.matchAll(/\/watch\?v=([a-zA-Z0-9_-]{11})/g)].map(m => m[1]))].slice(0, 9);
    if (!ids.length) return null;
    const results = await Promise.allSettled(
      ids.map(id =>
        fetchWithTimeout(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`, 3000)
          .then(r => r.json())
          .then(d => ({
            videoId: id,
            title: d.title || id,
            author: d.author_name || '',
            thumbnailUrl: `https://i.ytimg.com/vi/${id}/mqdefault.jpg`
          }))
          .catch(() => ({ videoId: id, title: id, author: '', thumbnailUrl: `https://i.ytimg.com/vi/${id}/mqdefault.jpg` }))
      )
    );
    return results.filter(r => r.status === 'fulfilled').map(r => r.value);
  } catch(e) { return null; }
}

async function doMultiSearch(q) {
  const res = document.getElementById('results-list');
  res.innerHTML = '<div class="hint">Buscando...</div>';

  // 1. Try YouTube Data API v3 (reliable, was working before)
  const key = window.__ytKey || '';
  if (key) {
    try {
      const results = await searchYouTubeAPI(q, key);
      if (results && results.length) { renderSearchResults(results); return; }
    } catch(e) {}
  }

  // 2. Race: Piped vs Invidious
  let results = null;
  try {
    results = await Promise.any([
      searchPiped(q),
      searchInvidious(q),
    ].map(p => p.then(r => r && r.length ? r : Promise.reject())));
  } catch(e) {}

  // 3. corsproxy fallback
  if (!results || !results.length) {
    res.innerHTML = '<div class="hint">Probando alternativa...</div>';
    results = await searchCorsProxy(q);
  }

  if (results && results.length) {
    renderSearchResults(results);
  } else {
    res.innerHTML = '<div class="hint" style="text-align:center;padding:16px">' +
      '<div style="margin-bottom:8px;color:var(--text-2)">Sin resultados. Copia el enlace de YouTube y pegalo arriba.</div>' +
      '<button class="btn btn-sec" onclick="openYouTubeSearch()">Buscar en YouTube</button>' +
    '</div>';
  }
}

function renderSearchResults(items) {
  const res = document.getElementById('results-list');
  res.innerHTML = items.map(item => {
    const id = item.videoId;
    if (!id) return '';
    const title = item.title || 'Video';
    const author = item.author || '';
    const thumb = item.thumbnailUrl || `https://i.ytimg.com/vi/${id}/mqdefault.jpg`;
    return '<div class="result-item" onclick="playResult(\'' + id + '\',\'' + h(title) + '\')">' +
      '<img class="result-thumb" src="' + thumb + '" alt="" onerror="this.src=\'https://i.ytimg.com/vi/' + id + '/mqdefault.jpg\'">' +
      '<div class="result-info"><div class="result-title">' + h(title) + '</div><div class="result-ch">' + h(author) + '</div></div>' +
      '<div class="result-act"><button class="btn btn-sec" style="padding:5px 8px;font-size:0.62rem" onclick="event.stopPropagation();sendResult(\'' + id + '\',\'' + h(title) + '\')">Enviar</button></div>' +
    '</div>';
  }).join('');
}

function openYouTubeSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (q) window.open('https://www.youtube.com/results?search_query=' + encodeURIComponent(q), '_blank');
}

function playResult(id, title) {
  if (mode === 'host') { loadVideo(id, title); }
  else { sendCmd('load', { videoId: id, title }); showToast('Enviando...'); }
}

function sendResult(id, title) {
  sendCmd('queue-add', { videoId: id, title, thumb: 'https://i.ytimg.com/vi/' + id + '/mqdefault.jpg' });
  // Also update local queue immediately (optimistic update)
  if (mode === 'remote') {
    queue.push({ id, title, thumb: 'https://i.ytimg.com/vi/' + id + '/mqdefault.jpg' });
    renderQueue();
  }
  showToast('Enviado a la cola');
}

/* ─── Queue ─── */
function renderQueue() {
  const list = document.getElementById('queue-list');
  document.getElementById('queue-count').textContent = queue.length;
  if (queue.length === 0) { list.innerHTML = '<div class="q-empty">Cola vacia</div>'; return; }
  list.innerHTML = queue.map((v, i) =>
    '<div class="q-item' + (v.id === currentVideoId ? ' playing' : '') + '">' +
      '<span class="q-num">' + (i+1) + '</span>' +
      '<img class="q-thumb" src="https://i.ytimg.com/vi/' + v.id + '/mqdefault.jpg" alt="">' +
      '<div class="q-info"><div class="q-title">' + h(v.title) + '</div></div>' +
      '<button class="q-del" onclick="queuePlay(' + i + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="5,3 19,12 5,21"/></svg></button>' +
      '<button class="q-del" onclick="queueDel(' + i + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>' +
    '</div>'
  ).join('');
}

function queuePlay(i) {
  if (mode === 'host') {
    const v = queue.splice(i, 1)[0];
    loadVideo(v.id, v.title); renderQueue();
  } else {
    sendCmd('queue-play', { index: i });
  }
}

function queueDel(i) {
  queue.splice(i, 1); renderQueue();
  sendCmd('queue-remove', { index: i });
}

/* ─── History ─── */
function addToHistory(id, title) {
  history = [{ id, title, time: Date.now() }, ...history.filter(h => h.id !== id)].slice(0, 50);
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('hist-list');
  if (history.length === 0) { list.innerHTML = '<div class="hist-empty">Aun no hay historial</div>'; return; }
  list.innerHTML = history.map((v, i) => {
    const ago = relativeTime(v.time);
    return '<div class="hist-item" onclick="playHistory(' + i + ')">' +
      '<img class="hist-thumb" src="https://i.ytimg.com/vi/' + v.id + '/mqdefault.jpg" alt="">' +
      '<div class="hist-info"><div class="hist-title2">' + h(v.title) + '</div><div class="hist-meta">' + ago + '</div></div>' +
    '</div>';
  }).join('');
}

function playHistory(i) {
  const v = history[i];
  if (mode === 'host') { loadVideo(v.id, v.title); }
  else { sendCmd('load', { videoId: v.id, title: v.title }); showToast('Enviando...'); }
}

function clearHistory() {
  history = []; renderHistory();
}

function relativeTime(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'Hace un momento';
  if (diff < 3600000) return 'Hace ' + Math.floor(diff/60000) + 'm';
  if (diff < 86400000) return 'Hace ' + Math.floor(diff/3600000) + 'h';
  return 'Hace ' + Math.floor(diff/86400000) + 'd';
}

/* ─── Host / Remote init ─── */
function initHost() {
  showScreen('host');
  loadYouTubeAPI();
  try {
    bc = new BroadcastChannel('ytrem:' + roomCode);
    bc.onmessage = (e) => handleMessage(e.data);
  } catch(e) {}
  initPeer();
}

function initRemote() {
  showScreen('control');
  try {
    bc = new BroadcastChannel('ytrem:' + roomCode);
    bc.onmessage = (e) => handleMessage(e.data);
  } catch(e) {}
  initPeer();
}

function loadYouTubeAPI() {
  if (document.getElementById('youtube-api')) return;
  const tag = document.createElement('script');
  tag.id = 'youtube-api';
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

/* ─── URL params on load ─── */
window.onload = () => {
  const p = new URLSearchParams(window.location.search);
  if (p.get('room')) document.getElementById('room-input').value = p.get('room').toUpperCase();
  if (p.get('mode') === 'remote') setMode('remote');
};

/* ─── Service Worker ─── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('yt-remote-sw.js').catch(() => {});
}
