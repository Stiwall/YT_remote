<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="theme-color" content="#FF0000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>YT Remote - Corregido</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════
   CORRECCIONES DE ESTILO Y UX
   ════════════════════════════════════════ */
:root {
  --red: #FF0000;
  --dark: #0f0f0f;
  --panel: #1a1a1a;
  --border: #333333;
  --text: #ffffff;
  --green: #00c853;
}

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  margin: 0;
  overscroll-behavior-y: none; /* Evita recarga accidental en móvil */
  min-height: 100dvh; /* Ajuste para barras de navegación móviles */
  display: flex;
  flex-direction: column;
}

/* Panel de Log optimizado para depuración */
.log-container {
  max-height: 120px;
  overflow-y: auto;
  font-size: 0.7rem;
  background: #000;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  scroll-behavior: smooth;
}

/* QR y estados de conexión */
.s-connected { color: var(--green); }
.s-disconnected { color: #ff4444; }

/* ════════════════════════════════════════
   ESTILOS ORIGINALES RELEVANTES
   ════════════════════════════════════════ */
.player-container {
  position: relative;
  padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
  height: 0;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
}

.player-container iframe {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
}
</style>
</head>
<body>

<header style="padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
  <div class="logo"><strong>YT</strong><span>Remote</span></div>
  <div id="connection-status" class="s-disconnected">● Desconectado</div>
</header>

<main id="screen-setup" style="padding: 20px; max-width: 400px; margin: 0 auto;">
  <div class="welcome-card" style="text-align: center; margin-bottom: 20px;">
    <h2>Sincronizar Dispositivo</h2>
    <p style="font-size: 0.9rem; color: #aaa;">Usa el mismo código en ambos dispositivos</p>
  </div>

  <div class="input-group" style="margin-bottom: 15px;">
    <input type="text" id="room-input" placeholder="CÓDIGO DE SALA" 
           style="width: 100%; padding: 15px; background: #000; border: 2px solid var(--border); color: #fff; text-align: center; font-size: 1.2rem; border-radius: 10px; text-transform: uppercase;">
  </div>

  <button id="btn-host" class="btn-primary" style="width: 100%; padding: 15px; background: var(--red); border: none; color: #fff; font-weight: bold; border-radius: 10px; cursor: pointer; margin-bottom: 10px;">
    MODO PANTALLA (HOST)
  </button>
  
  <button id="btn-remote" style="width: 100%; padding: 15px; background: #333; border: none; color: #fff; font-weight: bold; border-radius: 10px; cursor: pointer;">
    MODO CONTROL REMOTO
  </button>
</main>

<div id="screen-main" style="display:none; padding: 20px;">
  <div class="player-container" id="player-container">
    <div id="player"></div> </div>
  
  <div id="log-container" class="log-container" style="margin-top: 20px;">
    <div class="log-info">Sistema listo para conectar...</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
/* ════════════════════════════════════════
   LÓGICA DE CONEXIÓN CORREGIDA
   ════════════════════════════════════════ */

let roomCode = "";
const logBox = document.getElementById('log-container');

function addLog(msg, type = 'info') {
    const entry = document.createElement('div');
    entry.className = `log-${type}`;
    entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logBox.appendChild(entry);
    logBox.scrollTop = logBox.scrollHeight; // Auto-scroll al recibir datos
}

// CORRECCIÓN: Normalización del código de sala
function joinRoom() {
    const input = document.getElementById('room-input');
    roomCode = input.value.toUpperCase().trim(); // Evita errores por espacios o minúsculas
    
    if (roomCode.length < 3) {
        alert("Ingresa un código válido");
        return;
    }

    document.getElementById('screen-setup').style.display = 'none';
    document.getElementById('screen-main').style.display = 'block';
    
    const status = document.getElementById('connection-status');
    status.className = "s-connected";
    status.textContent = "● Conectado a: " + roomCode;
    
    addLog(`Conectado a sala: ${roomCode}`, 'recv');
}

// CORRECCIÓN: Manejo de errores de QR
function generateQR(code) {
    const container = document.getElementById('qr-canvas');
    if(!container) return;
    
    try {
        new QRCode(container, {
            text: window.location.origin + "?room=" + code,
            width: 128,
            height: 128
        });
    } catch(e) {
        // Fallback si la librería falla
        container.innerHTML = `<b style="color:red">Código: ${code}</b>`;
        addLog("Error cargando QR, usando modo texto", "warn");
    }
}

document.getElementById('btn-host').onclick = joinRoom;
document.getElementById('btn-remote').onclick = joinRoom;

// Evitar comportamientos táctiles que rompen la app
document.addEventListener('touchmove', function(e) {
    if (e.scale !== 1) { e.preventDefault(); }
}, { passive: false });
</script>

</body>
</html>
